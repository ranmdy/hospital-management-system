name: Build Java Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up JDK 25 with JavaFX included (Liberica Full)
    - name: Set up JDK 25 with JavaFX
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'liberica'
        java-package: 'jdk+fx'
        cache: 'maven' # Caches your dependencies so builds run faster next time

# Step 3: Tell Maven to package the project (this creates the classes/dependencies)
    - name: Build with Maven
      run: |
        mvn clean package -DskipTests

    # Step 4: Point jpackage to your exact artifacts directory where e-hospital.jar is expected
    - name: Create EXE with jpackage
      run: |
        jpackage --type app-image `
          --input out/artifacts/e_hospital_jar/ `
          --dest output/ `
          --name "HospitalManagementSystem" `
          --main-jar e-hospital.jar `
          --main-class com.example.ehospital.HelloApplication

    # Step 5: Zip the final application folder
    - name: Zip Executable Folder
      run: |
        Compress-Archive -Path output/HospitalManagementSystem -DestinationPath HospitalManagementSystem.zip

    # Step 6: Upload the .zip containing your .exe to the Actions tab
    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: HospitalManagementSystem.zip
