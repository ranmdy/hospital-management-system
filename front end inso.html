  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0;margin-top:3px;\">{{ rx.dosage }}<\u002Fdiv>\n                      <div style=\"font-size:13.5px;color:#6B6F76;margin-top:10px;line-height:1.5;\">{{ rx.notes }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ noRx }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-size:13.5px;color:#9A9EA5;line-height:1.5;\">No active prescription yet. Your doctor will issue one here after the consultation.<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <div style=\"background:#fff;border:1px solid #E8E4DC;border-radius:18px;padding:22px;\">\n                  <div style=\"font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8A8F94;margin-bottom:14px;\">Admission &amp; transfer<\u002Fdiv>\n                  <sc-if value=\"{{ isAdmitted }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div>\n                      <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#D9684A;\"><\u002Fspan><span style=\"font-size:16px;font-weight:800;color:#B14A33;\">Admitted<\u002Fspan><\u002Fdiv>\n                      <div style=\"margin-top:13px;font-size:14px;color:#3A3F47;line-height:1.7;\">Ward · <b>{{ admission.ward }}<\u002Fb><br>Bed · <b>{{ admission.bed }}<\u002Fb><br>Attending · <b>{{ admission.doctor }}<\u002Fb><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ showTransferCard }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div>\n                      <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#6B5DD3;\"><\u002Fspan><span style=\"font-size:16px;font-weight:800;color:#4B3FA6;\">Hospital transfer<\u002Fspan><\u002Fdiv>\n                      <div style=\"margin-top:11px;font-size:14px;color:#3A3F47;line-height:1.6;\">Your doctor is transferring you to<br><b>{{ transferDestP }}<\u002Fb><\u002Fdiv>\n                      <div style=\"margin-top:10px;\"><span style=\"{{ patientStatusPill.box }}\"><span style=\"{{ patientStatusPill.dot }}\"><\u002Fspan>{{ patientStatusPill.label }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ showNoCare }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"font-size:13.5px;color:#9A9EA5;line-height:1.5;\">You are not currently admitted. If your condition is severe, your doctor can admit you to a bed or transfer you to a partner hospital.<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"margin-top:18px;background:linear-gradient(100deg,#1F4D8F,#2A63B0);border-radius:18px;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;\">\n                <div>\n                  <div style=\"font-size:18px;font-weight:800;color:#fff;\">Not feeling well? Describe your symptoms.<\u002Fdiv>\n                  <div style=\"font-size:14px;color:#CADAF2;margin-top:4px;\">We’ll classify them and match you to the right specialist.<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ describe }}\" style=\"background:#fff;color:#1F4D8F;border:none;border-radius:11px;padding:13px 22px;font-size:15px;font-weight:800;cursor:pointer;flex-shrink:0;\">Describe symptoms<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- SYMPTOM INTAKE -->\n          <sc-if value=\"{{ isSymptom }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:28px 30px;max-width:760px;animation:fadeIn .25s ease both;\">\n              <div style=\"background:#fff;border:1px solid #E8E4DC;border-radius:18px;padding:26px;\">\n                <div style=\"font-siz        <\u002Fdiv>\n\n                <button onclick=\"{{ submitSymptoms }}\" style=\"width:100%;margin-top:20px;padding:14px;background:#1F4D8F;color:#fff;border:none;border-radius:12px;font-size:15.5px;font-weight:800;cursor:pointer;\" style-hover=\"background:#19407A;\">Submit &amp; start consultation<\u002Fbutton>\n                <div style=\"text-align:center;font-size:12.5px;color:#9A9EA5;margin-top:12px;\">You’ll be placed in {{ spec }} queue. Average wait · under 10 min.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- PATIENT CHAT -->\n          <sc-if value=\"{{ isPatientChat }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"height:100%;display:flex;animation:fadeIn .25s ease both;\">\n              <div style=\"flex:1;display:flex;flex-direction:column;min-width:0;\">\n                <div style=\"flex-shrink:0;padding:16px 26px;border-bottom:1px solid #E8E4DC;background:#fff;display:flex;align-items:center;gap:13px;\">\n                  <div style=\"width:44px;height:44px;border-radius:12px;background:#DDF0EB;color:#127566;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;\">NA<\u002Fdiv>\n                  <div style=\"flex:1;\">\n                    <div style=\"font-size:16px;font-weight:800;\">{{ doctor.name }}<\u002Fdiv>\n                    <div style=\"font-size:13px;color:#127566;font-weight:700;display:flex;align-items:center;gap:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#1F9E8A;\"><\u002Fspan>{{ doctor.spec }}, Online<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;overflow:auto;padding:22px 26px;background:#F4F1EC;\">\n                  <sc-for list=\"{{ chatMsgs }}\" as=\"m\" hint-placeholder-count=\"5\">\n                    <div style=\"{{ m.row }}\">\n                      <div style=\"{{ m.bubble }}\">\n                        <div style=\"{{ m.textStyle }}\">{{ m.text }}<\u002Fdiv>\n                        <sc-if value=\"{{ m.notSys }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"{{ m.timeStyle }}\">{{ m.time }}<\u002Fdiv><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"flex-shrink:0;padding:14px 26px;border-top:1px solid #E8E4DC;background:#fff;display:flex;gap:11px;align-items:center;\">\n                  <input value=\"{{ draftP }}\" onchange=\"{{ onDraftP }}\" onkeydown=\"{{ onKeyP }}\" placeholder=\"Type a message...\" style=\"flex:1;padding:12px 15px;border:1px solid #DDD8CE;border-radius:11px;font-size:14.5px;background:#FCFBF9;outline:none;color:#1A1C20;\">\n                  <button onclick=\"{{ sendP }}\" style=\"background:#1F4D8F;color:#fff;border:none;border-radius:11px;padding:12px 20px;font-size:14.5px;font-weight:800;cursor:pointer;\">Send<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"width:330px;flex-shrink:0;border-left:1px solid #E8E4DC;background:#FBFAF7;padding:22px;overflow:auto;\">\n                <div style=\"font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#8A8F94;margin-bottom:14px;\">Prescription<\u002Fdiv>\n                <sc-if value=\"{{ hasRx }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"background:#fff;border:1px solid #D7E3F4;border-radius:15px;overflow:hidden;animation:fadeIn .3s ease both;\">\n                    <div style=\"background:#1F4D8F;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:9px;\"><span style=\"font-weight:900;font-size:16px;\">℞<\u002Fspan><span style=\"font-weight:800;font-size:14px;\">Active prescription<\u002Fspan><\u002Fdiv>\n                    <div style=\"padding:16px;\">\n                      <div style=\"font-size:17px;font-weight:800;\">{{ rx.medicine }}<\u002Fdiv>\n                      <div style=\"font-size:14px;color:#1F4D8F;font-weight:700;margin-top:3px;\">{{ rx.dosage }}<\u002Fdiv>\n                      <div style=\"font-size:13px;color:#6B6F76;line-height:1.5;margin-top:12px;\">{{ rx.notes }}<\u002Fdiv>\n                      <div style=\"margin-top:14px;padding-top:13px;border-top:1px solid #EDEAE2;font-size:12.5px;color:#8A8F94;\">Issued by {{ rx.doctor }}, {{ rx.date }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noRx }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"background:#fff;border:1px dashed #D9D4CA;border-radius:15px;padding:24px 18px;text-align:center;\">\n                    <div style=\"font-size:30px;color:#C9C4BA;margin-bottom:8px;\">℞<\u002Fdiv>\n                    <div style=\"font-size:13.5px;color:#9A9EA5;line-height:1.5;\">No prescription yet. It will appear here the moment your doctor issues one.<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"margin-top:20px;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#8A8F94;margin-bottom:11px;\">Your details<\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E8E4DC;border-radius:13px;padding:14px 16px;font-size:13.5px;color:#3A3F47;line-height:1.9;\">{{ patient.name }}<br><span style=\"color:#9A9EA5;\">{{ patient.age }} · {{ patient.sex }} · {{ patient.id }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- DOCTOR DASHBOARD -->\n          <sc-if value=\"{{ isDoctorDash }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:28px 30px;max-width:1180px;animation:fadeIn .25s ease both;\">\n              <div style=\"display:grid;grid-template-columns:1.35fr 1fr;gap:18px;align-items:start;\">\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;\">\n                    <div style=\"font-size:17px;font-weight:800;\">Patient queue <span style=\"color:#9A9EA5;font-weight:700;\">· {{ queueCount }} waiting<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:6px;background:#EDEAE2;border-radius:11px;padding:4px;\">\n                      <button style=\"{{ availBtnAvail }}\" onclick=\"{{ setAvailA }}\">Available<\u002Fbutton>\n                      <button style=\"{{ availBtnBusy }}\" onclick=\"{{ setAvailB }}\">Busy<\u002Fbutton>\n                      <button style=\"{{ availBtnHold }}\" onclick=\"{{ setAvailH }}\">On-hold<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-for list=\"{{ queueRows }}\" as=\"q\" hint-placeholder-count=\"4\">\n                    <div style=\"{{ q.row }}\">\n                      <div style=\"{{ q.avatar }}\">{{ q.initials }}<\u002Fdiv>\n                      <div style=\"flex:1;min-width:0;\">\n                        <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"font-size:15px;font-weight:800;\">{{ q.name }}<\u002Fspan><sc-if value=\"{{ q.isNext }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:10.5px;font-weight:800;letter-spacing:.05em;background:#1F4D8F;color:#fff;padding:2px 7px;border-radius:5px;\">NEXT<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                        <div style=\"font-size:13px;color:#8A8F94;margin-top:2px;\">{{ q.cls }} · {{ q.note }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"text-align:right;flex-shrink:0;\">\n                        <span style=\"{{ q.pill.box }}\"><span style=\"{{ q.pill.dot }}\"><\u002Fspan>{{ q.pill.label }}<\u002Fspan>\n                        <div style=\"font-size:12px;color:#9A9EA5;margin-top:5px;\">waited {{ q.wait }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <div style=\"background:#13294C;border-radius:18px;padding:22px;color:#EAF0FA;position:sticky;top:0;\">\n                  <div style=\"font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#90A0BC;margin-bottom:14px;\">Current active patient<\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:13px;\">\n                    <div style=\"width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;\">EO<\u002Fdiv>\n                    <div>\n                      <div style=\"font-size:18px;font-weight:800;\">{{ activePatient.name }}<\u002Fdiv>\n                      <div style=\"font-size:13px;color:#A9BBD6;\">{{ activePatient.age }} · {{ activePatient.sex }} · Respiratory<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:16px;background:rgba(255,255,255,0.08);border-radius:12px;padding:13px 15px;font-size:13.5px;line-height:1.55;color:#CFDAEC;\">Dry cough 5 days, mild fever 38.1°C, shortness of breath on exertion.<\u002Fdiv>\n                  <button onclick=\"{{ accept }}\" style=\"width:100%;margin-top:16px;background:#fff;color:#13294C;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;\">Accept &amp; consult<\u002Fbutton>\n                  <div style=\"display:flex;gap:9px;margin-top:9px;\">\n                    <button onclick=\"{{ accept }}\" style=\"flex:1;background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:11px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer;\">Next patient<\u002Fbutton>\n                    <button onclick=\"{{ setAvailH }}\" style=\"flex:1;background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:11px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointe :'11px',fontWeight:'800',letterSpacing:'.04em',background:m.bg,color:m.fg,textTransform:'uppercase',lineHeight:'1.5'}};\n  }\n\n  renderVals(){\n    const s=this.state;\n    const role=s.role;\n    const dark = (this.props.sidebarStyle||'light')==='dark';\n    const showLegend = this.props.showLegend ?? true;\n\n    const sb = dark\n      ? {container:{width:'248px',flexShrink:'0',background:'#13294C',color:'#EAF0FA',display:'flex',flexDirection:'column',padding:'22px 16px',borderRight:'1px solid rgba(255,255,255,0.06)'}, brand:'#fff', sub:'#90A0BC', divider:'rgba(255,255,255,0.09)', logoBg:'#fff', logoFg:'#13294C'}\n      : {container:{width:'248px',flexShrink:'0',background:'#FBFAF7',color:'#1A1C20',display:'flex',flexDirection:'column',padding:'22px 16px',borderRight:'1px solid #E8E4DC'}, brand:'#16243B', sub:'#8A8F94', divider:'#E8E4DC', logoBg:'#1F4D8F', logoFg:'#fff'};\n\n    const ns=(a)=>({display:'flex',alignItems:'center',gap:'12px',padding:'10px 12px',borderRadius:'10px',cursor:'pointer',fontSize:'14.5px',fontWeight:a?'700':'600',transition:'background .15s',color:a?(dark?'#fff':'#1F4D8F'):(dark?'#A9B6CD':'#5A6068'),background:a?(dark?'rgba(255,255,255,0.12)':'#E9F0FB'):'transparent'});\n\n    const me = role==='patient' ? {name:this.patient.name, sub:'Patient, '+this.patient.id, initials:this.patient.initials, bg:'#1F4D8F'}\n      : role==='doctor' ? {name:this.doctor.name, sub:this.doctor.spec, initials:this.doctor.initials, bg:'#127566'}\n      : {name:'Amaka Okonkwo', sub:'Hospital, '+this.myHospital.name, initials:'AO', bg:'#B14A33'};\n\n    const vaStyle=(a,c)=>({flex:'1',textAlign:'center',padding:'7px 0',borderRadius:'8px',cursor:'pointer',fontSize:'12px',fontWeight:'700',border:'none',fontFamily:'inherit',background:a?c:(dark?'rgba(255,255,255,0.08)':'#EFEDE8'),color:a?'#fff':(dark?'#A9B6CD':'#7A7F86')});\n\n    const titles={\n      'patient-dash':['Dashboard','Your care at a glance'],\n      'symptom-intake':['Describe symptoms','We will route
